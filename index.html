<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>乌托邦</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;overflow:hidden;font-family:'Segoe UI','Microsoft YaHei',sans-serif;user-select:none;-webkit-user-select:none;cursor:grab}
body:active,body.dragging{cursor:grabbing}
canvas{display:block}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(100,140,200,.3);border-radius:2px}

#menu-screen{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s}
#menu-screen.hidden{opacity:0;pointer-events:none}
#menu-screen .menu-title{font-size:48px;font-weight:300;color:#ddeeff;letter-spacing:8px;text-shadow:0 0 60px rgba(100,160,220,.6),0 2px 20px rgba(0,0,0,.8);margin-bottom:10px}
#menu-screen .menu-sub{font-size:13px;color:rgba(180,200,230,.5);letter-spacing:3px;margin-bottom:60px;text-shadow:0 2px 10px rgba(0,0,0,.8)}
#menu-screen .menu-btn{width:260px;padding:16px 0;margin:8px 0;border:1px solid rgba(100,160,220,.45);border-radius:12px;background:rgba(10,15,30,.65);backdrop-filter:blur(12px);color:#bbddee;font-size:16px;letter-spacing:4px;cursor:pointer;transition:all .25s}
#menu-screen .menu-btn:hover{background:rgba(30,50,90,.8);border-color:rgba(140,190,255,.6);color:#fff;transform:scale(1.03)}
#menu-screen .menu-btn:active{transform:scale(.97)}

#select-phase-hint{position:fixed;top:25%;left:340px;transform:translateX(-50%);color:rgba(220,230,255,.75);font-size:26px;letter-spacing:4px;font-weight:300;z-index:30;pointer-events:none;opacity:0;transition:opacity .5s;text-shadow:0 2px 12px rgba(0,0,0,.6)}
#select-phase-hint.visible{opacity:1}
#confirm-btn{position:fixed;bottom:40px;right:40px;z-index:30;padding:14px 36px;border:1px solid rgba(255,200,60,.5);border-radius:12px;background:rgba(255,200,60,.15);backdrop-filter:blur(10px);color:#ffd877;font-size:15px;letter-spacing:3px;cursor:pointer;opacity:0;transform:translateY(20px);transition:all .3s;pointer-events:none}
#confirm-btn.visible{opacity:1;transform:translateY(0);pointer-events:auto}
#confirm-btn:hover{background:rgba(255,200,60,.3);border-color:rgba(255,200,60,.8)}
#back-btn{position:fixed;bottom:40px;left:40px;z-index:30;padding:12px 28px;border:1px solid rgba(100,180,255,.35);border-radius:12px;background:rgba(20,30,60,.6);backdrop-filter:blur(10px);color:#99bbdd;font-size:14px;letter-spacing:2px;cursor:pointer;opacity:0;transform:translateY(20px);transition:all .3s;pointer-events:none}
#back-btn.visible{opacity:1;transform:translateY(0);pointer-events:auto}
#back-btn:hover{background:rgba(40,70,120,.7);border-color:rgba(140,190,255,.5);color:#fff}
#preview-flag{position:fixed;top:0;left:0;bottom:0;width:500px;z-index:29;pointer-events:none;opacity:0;transition:opacity .4s;overflow:visible}
#preview-flag.visible{opacity:1}
#preview-flag.sink{opacity:0;transition:opacity .5s}
#preview-name-cn{position:fixed;top:50%;left:340px;transform:translate(-50%,-180px);z-index:30;font-size:28px;font-weight:700;color:#ffd877;letter-spacing:4px;white-space:nowrap;pointer-events:none;text-shadow:0 2px 12px rgba(0,0,0,.7);transition:opacity .2s,transform .2s}
#preview-flag-img{position:fixed;top:50%;left:340px;transform:translate(-50%,-50%);z-index:30;width:320px;height:213px;box-shadow:none;object-fit:contain;pointer-events:none;transition:opacity .2s,transform .2s}
#preview-flag-img.switching{opacity:0;transform:translate(-50%,-50%) scale(.85)}
#preview-placeholder{position:fixed;top:50%;left:340px;transform:translate(-50%,-50%);z-index:30;font-size:28px;color:rgba(180,200,230,.6);letter-spacing:4px;white-space:nowrap;pointer-events:none;text-shadow:0 2px 10px rgba(0,0,0,.5);transition:opacity .4s}
#preview-placeholder.hidden{opacity:0}
#preview-name-en{position:fixed;top:50%;left:340px;transform:translate(-50%,130px);z-index:30;font-size:14px;color:rgba(180,200,230,.7);letter-spacing:2px;white-space:nowrap;pointer-events:none;text-shadow:0 2px 8px rgba(0,0,0,.7);transition:opacity .2s}
#preview-name-cn.switching,#preview-name-en.switching{opacity:0}
#preview-gradient{position:fixed;top:0;left:0;bottom:0;width:500px;z-index:28;pointer-events:none;background:linear-gradient(to right,rgba(200,210,230,.18) 0%,rgba(200,210,230,.08) 40%,transparent 100%);opacity:0;transition:opacity .4s}
#preview-gradient.visible{opacity:1}
#preview-gradient.sink{opacity:0;transition:opacity .5s}

#loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#99bbdd;font-size:14px;z-index:100;transition:opacity .5s;pointer-events:none}

#pause-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,16,.7);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .35s}
#pause-overlay.visible{opacity:1;pointer-events:auto}
#pause-menu{display:flex;flex-direction:column;align-items:center;gap:16px}
#pause-menu .pause-btn{width:240px;padding:14px 0;border:1px solid rgba(100,180,255,.4);border-radius:12px;background:rgba(10,20,40,.7);backdrop-filter:blur(12px);color:#bbddee;font-size:15px;letter-spacing:4px;cursor:pointer;transition:all .25s}
#pause-menu .pause-btn:hover{background:rgba(30,50,90,.8);border-color:rgba(140,190,255,.6);color:#fff;transform:scale(1.04)}
#pause-menu .pause-btn:active{transform:scale(.96)}
#pause-menu .pause-btn.danger{border-color:rgba(255,120,100,.4);color:#ffaa99}
#pause-menu .pause-btn.danger:hover{background:rgba(90,30,20,.7);border-color:rgba(255,120,100,.7);color:#fff}

#aoh-top-bar{position:fixed;top:0;left:0;right:0;height:48px;z-index:100;background:linear-gradient(180deg,rgba(15,18,32,.95),rgba(10,12,24,.9));border-bottom:1px solid rgba(80,120,200,.3);display:none;align-items:center;padding:0 12px;gap:8px;font-size:12px;color:#aabbcc}
#aoh-top-bar.visible{display:flex}
#aoh-top-bar .bar-flag{width:40px;height:26px;object-fit:contain;cursor:pointer;flex-shrink:0;border:1px solid rgba(80,120,200,.3);border-radius:3px}
#aoh-top-bar .bar-country{font-size:14px;font-weight:600;color:#e0d0a0;letter-spacing:2px;margin-right:12px;white-space:nowrap}
#aoh-top-bar .bar-sep{width:1px;height:28px;background:rgba(80,120,200,.25);flex-shrink:0}
#aoh-top-bar .bar-res{display:flex;align-items:center;gap:4px;padding:0 8px;white-space:nowrap;cursor:default;position:relative}
#aoh-top-bar .bar-res .tip{display:none;position:absolute;top:100%;left:50%;transform:translateX(-50%);margin-top:6px;background:rgba(10,15,30,.95);border:1px solid rgba(80,120,200,.4);border-radius:6px;padding:4px 10px;font-size:11px;color:#bbddee;white-space:nowrap;z-index:200;pointer-events:none}
#aoh-top-bar .bar-res:hover .tip{display:block}
#aoh-top-bar .bar-res .res-icon{font-size:14px}
#aoh-top-bar .bar-res .res-val{font-weight:600;color:#dde}
#aoh-top-bar .bar-res.clickable{cursor:pointer;border-radius:4px;transition:background .2s}
#aoh-top-bar .bar-res.clickable:hover{background:rgba(80,140,220,.2)}
#bar-time{margin-left:auto;display:flex;align-items:center;gap:6px}
#bar-time .time-text{font-family:'Courier New',monospace;font-weight:600;color:#dde;min-width:100px;text-align:center}
.time-btn{width:24px;height:24px;border-radius:6px;border:1px solid rgba(100,180,255,.25);background:rgba(20,30,60,.5);color:#8899aa;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;user-select:none}
.time-btn:hover{background:rgba(40,70,120,.7);border-color:rgba(140,190,255,.5);color:#fff}
.time-btn:active{transform:scale(.92)}
.time-btn.active{background:rgba(80,140,220,.4);border-color:rgba(100,180,255,.6);color:#fff}
#time-speed{font-size:9px;color:#556;min-width:18px;text-align:center}

#aoh-left-sidebar{position:fixed;top:52px;left:0;width:44px;z-index:100;background:linear-gradient(180deg,rgba(15,18,32,.92),rgba(10,12,24,.88));border-right:1px solid rgba(80,120,200,.2);display:none;flex-direction:column;align-items:center;padding:8px 0;gap:2px}
#aoh-left-sidebar.visible{display:flex}
#aoh-left-sidebar .map-mode-btn{width:36px;height:36px;border-radius:6px;border:1px solid rgba(80,120,200,.15);background:transparent;color:#7788aa;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;position:relative}
#aoh-left-sidebar .map-mode-btn:hover{background:rgba(80,140,220,.15);border-color:rgba(100,180,255,.4);color:#bbddee}
#aoh-left-sidebar .map-mode-btn.active{background:rgba(80,140,220,.25);border-color:rgba(100,180,255,.5);color:#fff}
#aoh-left-sidebar .map-mode-btn .tip{display:none;position:absolute;left:48px;top:50%;transform:translateY(-50%);background:rgba(10,15,30,.95);border:1px solid rgba(80,120,200,.4);border-radius:6px;padding:4px 10px;font-size:11px;color:#bbddee;white-space:nowrap;z-index:200;pointer-events:none}
#aoh-left-sidebar .map-mode-btn:hover .tip{display:block}

#aoh-bottom-panel{position:fixed;bottom:0;left:44px;right:0;height:56px;z-index:100;background:linear-gradient(0deg,rgba(15,18,32,.95),rgba(10,12,24,.9));border-top:1px solid rgba(80,120,200,.3);display:none;align-items:center;padding:0 16px;gap:12px;font-size:12px;color:#aabbcc}
#aoh-bottom-panel.visible{display:flex}
#aoh-bottom-panel .bp-section{display:flex;align-items:center;gap:6px}
#aoh-bottom-panel .bp-btn{padding:6px 14px;border:1px solid rgba(80,120,200,.3);border-radius:6px;background:rgba(20,30,60,.5);color:#99aacc;font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap}
#aoh-bottom-panel .bp-btn:hover{background:rgba(40,70,120,.6);border-color:rgba(100,180,255,.5);color:#dde}
#aoh-bottom-panel .bp-btn:active{transform:scale(.95)}
#aoh-bottom-panel .bp-btn.active{background:rgba(80,140,220,.3);border-color:rgba(100,180,255,.6);color:#fff}
#aoh-bottom-panel .bp-sep{width:1px;height:28px;background:rgba(80,120,200,.2)}
#aoh-bottom-panel .bp-count{font-size:11px;color:#7788aa}
#aoh-bottom-panel .bp-count span{color:#dde;font-weight:600}

#aoh-right-panel{position:fixed;top:52px;right:0;width:280px;bottom:56px;z-index:99;background:rgba(15,18,32,.92);border-left:1px solid rgba(80,120,200,.2);display:none;flex-direction:column;padding:12px;overflow-y:auto;font-size:12px;color:#aabbcc}
#aoh-right-panel.visible{display:flex}
#aoh-right-panel .rp-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(80,120,200,.2)}
#aoh-right-panel .rp-flag{width:48px;height:32px;object-fit:contain;border:1px solid rgba(80,120,200,.3);border-radius:3px}
#aoh-right-panel .rp-name{font-size:15px;font-weight:600;color:#e0d0a0}
#aoh-right-panel .rp-sub{font-size:10px;color:#7788aa}
#aoh-right-panel .rp-section{margin-top:10px}
#aoh-right-panel .rp-section-title{font-size:11px;color:#667788;letter-spacing:1px;margin-bottom:6px;text-transform:uppercase}
#aoh-right-panel .rp-stat{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}
#aoh-right-panel .rp-stat .rp-label{color:#8899aa}
#aoh-right-panel .rp-stat .rp-value{color:#dde;font-weight:600}
#aoh-right-panel .rp-divider{height:1px;background:rgba(80,120,200,.15);margin:8px 0}

#aoh-side-btns{position:fixed;top:52px;right:0;z-index:101;display:none;flex-direction:column;gap:4px;padding:8px 6px}
#aoh-side-btns.visible{display:flex}
#aoh-side-btns .sb-btn{width:44px;height:44px;border-radius:8px;border:1px solid rgba(80,120,200,.25);background:rgba(15,18,32,.88);color:#7788aa;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;position:relative}
#aoh-side-btns .sb-btn:hover{background:rgba(40,70,120,.5);border-color:rgba(100,180,255,.5);color:#dde}
#aoh-side-btns .sb-btn .tip{display:none;position:absolute;right:52px;top:50%;transform:translateY(-50%);background:rgba(10,15,30,.95);border:1px solid rgba(80,120,200,.4);border-radius:6px;padding:4px 10px;font-size:11px;color:#bbddee;white-space:nowrap;z-index:200;pointer-events:none}
#aoh-side-btns .sb-btn:hover .tip{display:block}
#aoh-side-btns .sb-btn.researching{border-color:rgba(255,200,60,.5);animation:sbPulse 2s infinite}
@keyframes sbPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,200,60,0)}50%{box-shadow:0 0 8px 2px rgba(255,200,60,.2)}}

#zoom-distance{position:fixed;top:56px;left:50%;transform:translateX(-50%);color:rgba(180,200,230,.6);font-size:11px;font-family:'Courier New',monospace;z-index:10;pointer-events:none;background:rgba(0,0,0,.3);padding:4px 12px;border-radius:4px;display:none}
#zoom-distance.visible{display:block}

#aoh-notifications{position:fixed;top:56px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none}
.aoh-notif{padding:8px 20px;border-radius:8px;background:rgba(15,20,40,.92);border:1px solid rgba(80,140,220,.4);backdrop-filter:blur(8px);color:#bbddee;font-size:13px;animation:notifIn .3s ease-out;pointer-events:none;white-space:nowrap}
.aoh-notif.fade{animation:notifOut .4s ease-in forwards}
@keyframes notifIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes notifOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-10px)}}

.aoh-popup-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,10,.5);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;pointer-events:none}
.aoh-popup-overlay.visible{display:flex;pointer-events:auto}
.aoh-popup{background:rgba(12,16,30,.96);border:1px solid rgba(80,120,200,.35);border-radius:12px;padding:20px;min-width:400px;max-width:600px;max-height:80vh;overflow-y:auto;color:#aabbcc}
.aoh-popup .popup-title{font-size:18px;font-weight:600;color:#e0d0a0;letter-spacing:2px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.aoh-popup .popup-close{margin-left:auto;width:28px;height:28px;border-radius:6px;border:1px solid rgba(255,100,80,.3);background:transparent;color:#aa8877;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.aoh-popup .popup-close:hover{background:rgba(255,80,60,.2);border-color:rgba(255,120,100,.6);color:#fff}
.aoh-popup .tech-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.aoh-popup .tech-card{padding:10px;border:1px solid rgba(80,120,200,.2);border-radius:8px;background:rgba(20,28,50,.5);cursor:pointer;transition:all .2s}
.aoh-popup .tech-card:hover{border-color:rgba(100,180,255,.5);background:rgba(30,45,80,.6)}
.aoh-popup .tech-card.researched{border-color:rgba(80,200,120,.4);background:rgba(20,50,30,.4)}
.aoh-popup .tech-card.researching{border-color:rgba(255,200,60,.5);background:rgba(50,40,20,.4)}
.aoh-popup .tech-card .tech-name{font-size:13px;font-weight:600;color:#dde;margin-bottom:4px}
.aoh-popup .tech-card .tech-desc{font-size:10px;color:#7788aa;line-height:1.4}
.aoh-popup .tech-card .tech-cost{font-size:10px;color:#ffd877;margin-top:4px}
.aoh-popup .tech-card .tech-progress{height:3px;background:rgba(80,120,200,.2);border-radius:2px;margin-top:4px;overflow:hidden}
.aoh-popup .tech-card .tech-progress-bar{height:100%;background:linear-gradient(90deg,#ffd877,#ffaa44);border-radius:2px;transition:width .3s}

.officer-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.officer-card{padding:10px;border:1px solid rgba(80,120,200,.2);border-radius:8px;background:rgba(20,28,50,.5);text-align:center;transition:all .2s}
.officer-card:hover{border-color:rgba(100,180,255,.5)}
.officer-card .off-name{font-size:13px;font-weight:600;color:#dde}
.officer-card .off-spec{font-size:10px;color:#ffd877;margin:2px 0}
.officer-card .off-stats{font-size:10px;color:#8899aa}
.officer-card .off-skill{display:flex;justify-content:space-between;padding:2px 0;font-size:10px}
.officer-card .off-skill .sk-name{color:#8899aa}
.officer-card .off-skill .sk-val{color:#dde;font-weight:600}

.diplo-grid{display:flex;flex-direction:column;gap:6px}
.diplo-row{display:flex;align-items:center;gap:10px;padding:8px;border:1px solid rgba(80,120,200,.15);border-radius:6px;background:rgba(20,28,50,.3);transition:all .2s}
.diplo-row:hover{border-color:rgba(100,180,255,.3)}
.diplo-row .diplo-flag{width:32px;height:22px;object-fit:contain;border:1px solid rgba(80,120,200,.3);border-radius:2px}
.diplo-row .diplo-name{font-size:12px;color:#dde;flex:1}
.diplo-row .diplo-rel{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600}
.diplo-row .diplo-rel.ally{background:rgba(80,200,120,.15);color:#88ddaa}
.diplo-row .diplo-rel.neutral{background:rgba(180,180,180,.1);color:#aaa}
.diplo-row .diplo-rel.rival{background:rgba(255,100,80,.15);color:#dd8877}

#select-box{position:fixed;border:1px solid rgba(100,200,255,.5);background:rgba(100,200,255,.08);pointer-events:none;display:none;z-index:50}

body{overflow:hidden}
</style>
</head>
<body>

<div id="menu-screen">
  <div class="menu-title">乌 托 邦</div>
  <div class="menu-sub">UTOPIA · 3D STRATEGY</div>
  <button class="menu-btn" id="btn-start">开 始 游 戏</button>
  <button class="menu-btn" id="btn-settings">设 置</button>
</div>

<div id="select-phase-hint"></div>
<button id="confirm-btn">确认选择</button>
<button id="back-btn">返回</button>
<div id="preview-gradient"></div>
<div id="preview-placeholder" class="hidden">点击地球选中国家</div>
<div id="preview-flag">
  <div id="preview-name-cn"></div>
  <img id="preview-flag-img" src="" alt="">
  <div id="preview-name-en"></div>
</div>

<div id="aoh-top-bar">
  <img class="bar-flag" id="bar-flag-img" src="" alt="">
  <span class="bar-country" id="bar-country-name">--</span>
  <div class="bar-sep"></div>
  <div class="bar-res" id="res-gold"><span class="res-icon">💰</span><span class="res-val" id="val-gold">0</span><span class="tip">金币 - 用于建设和招募</span></div>
  <div class="bar-res" id="res-economy"><span class="res-icon">📊</span><span class="res-val" id="val-economy">0</span><span class="tip">经济 - 影响收入和增长率</span></div>
  <div class="bar-res" id="res-manpower"><span class="res-icon">👥</span><span class="res-val" id="val-manpower">0</span><span class="tip">人力 - 用于征兵</span></div>
  <div class="bar-res clickable" id="res-diplomacy"><span class="res-icon">🤝</span><span class="res-val" id="val-diplomacy">0</span><span class="tip">外交点 - 点击查看关系</span></div>
  <div class="bar-res" id="res-legacy"><span class="res-icon">🏛</span><span class="res-val" id="val-legacy">0</span><span class="tip">威望 - 影响外交</span></div>
  <div class="bar-sep"></div>
  <div class="bar-res" id="res-population"><span class="res-icon">🏘</span><span class="res-val" id="val-population">0</span><span class="tip">人口 - 国家总人口</span></div>
  <div class="bar-res" id="res-growth"><span class="res-icon">📈</span><span class="res-val" id="val-growth">+0%</span><span class="tip">增长率 - 受经济影响</span></div>
  <div class="bar-res" id="res-war"><span class="res-icon">⚔</span><span class="res-val" id="val-war">和平</span><span class="tip">战争状态</span></div>
  <div id="bar-time">
    <span class="time-text" id="time-text">2026年1月1日 00:00</span>
    <button class="time-btn" id="btn-slower" title="减速 - 降低游戏速度">-</button>
    <span id="time-speed">x1</span>
    <button class="time-btn" id="btn-faster" title="加速 - 提高游戏速度">+</button>
    <button class="time-btn" id="btn-pause" title="暂停/继续">||</button>
  </div>
</div>

<div id="aoh-left-sidebar">

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
window.addEventListener('error', (e) => { const d = document.getElementById('loading'); if (d) { d.textContent = 'ERROR: ' + e.message + ' L:' + e.lineno; d.style.background = 'rgba(200,0,0,0.9)'; d.style.color = 'white'; d.style.zIndex = '9999'; } });
window.addEventListener('unhandledrejection', (e) => { const d = document.getElementById('loading'); if (d) { d.textContent = 'PROMISE ERROR: ' + e.reason; d.style.background = 'rgba(200,0,0,0.9)'; d.style.color = 'white'; d.style.zIndex = '9999'; } });
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

let gameState = 'menu';
let confirmedCountry = null;
let earthStopped = false;

let camAnim = { active: false, t: 0, from: null, to: null, dur: 1200 };
let earthAnim = { active: false, t: 0, from: 0, to: 0, dur: 1200 };
let earthAnimX = { active: false, t: 0, from: 0, to: 0, dur: 1200 };
let rotAnim = { active: false, t: 0, from: 0, to: 0, dur: 1200 };
let rotAnimX = { active: false, t: 0, from: 0, to: 0, dur: 1200 };

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0.8, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 1.2;
controls.maxDistance = 8;
controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: null };
controls.target.set(0, 0, 0);
controls.enabled = false;
controls.update();

let mouseNormY = 0;
let mouseScreenX = 0.5;
let mouseScreenY = 0.5;
let mouseOnEarth = false;
let globeDragging = false;
let globeDragLastX = 0;
let globeDragLastY = 0;
let globeVelocityX = 0;
let globeVelocityY = 0;
let cameraTarget = new THREE.Vector3(0, 0, 0);

let selectBoxActive = false;
let selectBoxStart = { x: 0, y: 0 };

document.addEventListener('pointerdown', (e) => {
  if (e.target !== renderer.domElement) return;
  if (e.button === 1) {
    selectBoxActive = true;
    selectBoxStart.x = e.clientX;
    selectBoxStart.y = e.clientY;
    const box = document.getElementById('select-box');
    box.style.display = 'block';
    box.style.left = e.clientX + 'px';
    box.style.top = e.clientY + 'px';
    box.style.width = '0px';
    box.style.height = '0px';
    return;
  }
  if (e.button !== 0) return;
  if (gameState === 'selecting' || gameState === 'playing') {
    globeDragging = true;
    globeDragLastX = e.clientX;
    globeDragLastY = e.clientY;
    globeVelocityX = 0;
    globeVelocityY = 0;
    controls.enabled = false;
  }
});

document.addEventListener('pointermove', (e) => {
  mouseNormY = (e.clientY / window.innerHeight) * 2 - 1;
  mouseScreenX = e.clientX / window.innerWidth;
  mouseScreenY = e.clientY / window.innerHeight;
  if (selectBoxActive) {
    const box = document.getElementById('select-box');
    const x = Math.min(e.clientX, selectBoxStart.x);
    const y = Math.min(e.clientY, selectBoxStart.y);
    const w = Math.abs(e.clientX - selectBoxStart.x);
    const h = Math.abs(e.clientY - selectBoxStart.y);
    box.style.left = x + 'px';
    box.style.top = y + 'px';
    box.style.width = w + 'px';
    box.style.height = h + 'px';
  }
  if (globeDragging) {
    const dx = e.clientX - globeDragLastX;
    const dy = e.clientY - globeDragLastY;
    const dist = camera.position.length();
    const sens = 0.003 * Math.pow(Math.min(1, dist / 3.5), 2);
    globeVelocityX = dx * sens;
    globeVelocityY = dy * sens;
    earthGroup.rotation.y += globeVelocityX;
    if (gameState === 'playing' || gameState === 'selecting') {
      earthGroup.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, earthGroup.rotation.x + globeVelocityY));
    }
    globeDragLastX = e.clientX;
    globeDragLastY = e.clientY;
  }
});

document.addEventListener('pointerup', (e) => {
  if (selectBoxActive) {
    selectBoxActive = false;
    document.getElementById('select-box').style.display = 'none';
  }
  if (globeDragging) {
    globeDragging = false;
    controls.enabled = false;
  }
});

document.addEventListener('wheel', (e) => {
  if (e.target !== renderer.domElement) return;
  if (gameState !== 'playing') return;
  e.preventDefault();
  const dir = camera.position.clone().sub(cameraTarget).normalize();
  const delta = e.deltaY * 0.001;
  camera.position.addScaledVector(dir, delta);
  const dist = camera.position.distanceTo(cameraTarget);
  if (dist < 1.2) camera.position.copy(cameraTarget.clone().addScaledVector(dir, 1.2));
  if (dist > 8) camera.position.copy(cameraTarget.clone().addScaledVector(dir, 8));
  camera.lookAt(cameraTarget);
}, { passive: false });

let touchDist = 0;
document.addEventListener('touchstart', (e) => {
  if (e.target !== renderer.domElement) return;
  if (e.touches.length === 2 && gameState === 'playing') {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    touchDist = Math.sqrt(dx * dx + dy * dy);
  }
}, { passive: true });

document.addEventListener('touchmove', (e) => {
  if (e.target !== renderer.domElement) return;
  if (e.touches.length === 2 && gameState === 'playing' && touchDist > 0) {
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const newDist = Math.sqrt(dx * dx + dy * dy);
    const delta = (touchDist - newDist) * 0.005;
    touchDist = newDist;
    const dir = camera.position.clone().sub(cameraTarget).normalize();
    camera.position.addScaledVector(dir, delta);
    const dist = camera.position.distanceTo(cameraTarget);
    if (dist < 1.2) camera.position.copy(cameraTarget.clone().addScaledVector(dir, 1.2));
    if (dist > 8) camera.position.copy(cameraTarget.clone().addScaledVector(dir, 8));
    camera.lookAt(cameraTarget);
  }
}, { passive: false });

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.5, 0.4, 0.85);
bloomPass.threshold = 0.1; bloomPass.strength = 0.6; bloomPass.radius = 0.5;
composer.addPass(bloomPass);

function createStarField() {
  const starsGeo = new THREE.BufferGeometry();
  const count = 4000;
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 50 + Math.random() * 20;
    positions[i*3] = r * Math.sin(phi) * Math.cos(theta);
    positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i*3+2] = r * Math.cos(phi);
    const t = Math.random();
    if (t < 0.6) { colors[i*3]=0.8+Math.random()*0.2; colors[i*3+1]=0.8+Math.random()*0.2; colors[i*3+2]=0.9+Math.random()*0.1; }
    else if (t < 0.8) { colors[i*3]=0.5+Math.random()*0.3; colors[i*3+1]=0.6+Math.random()*0.3; colors[i*3+2]=0.9+Math.random()*0.1; }
    else { colors[i*3]=0.9+Math.random()*0.1; colors[i*3+1]=0.7+Math.random()*0.2; colors[i*3+2]=0.5+Math.random()*0.3; }
  }
  starsGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  starsGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const starGroup = new THREE.Group();
  starGroup.name = 'starGroup';
  starGroup.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({
    size: 0.08, vertexColors: true, blending: THREE.AdditiveBlending,
    depthWrite: false, transparent: true, opacity: 0.9,
  })));
  const gGeo = new THREE.BufferGeometry();
  const gCount = 1500;
  const gPos = new Float32Array(gCount * 3);
  const gCol = new Float32Array(gCount * 3);
  for (let i = 0; i < gCount; i++) {
    const theta = Math.random() * Math.PI * 2;
    const r = 45 + Math.random() * 15;
    const phi = 0.8 + Math.random() * 0.4;
    gPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
    gPos[i*3+1] = r * Math.cos(phi) + (Math.random()-0.5)*8;
    gPos[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
    const b = 0.3 + Math.random() * 0.4;
    gCol[i*3] = b; gCol[i*3+1] = b*0.8; gCol[i*3+2] = b*1.2;
  }
  gGeo.setAttribute('position', new THREE.BufferAttribute(gPos, 3));
  gGeo.setAttribute('color', new THREE.BufferAttribute(gCol, 3));
  starGroup.add(new THREE.Points(gGeo, new THREE.PointsMaterial({
    size: 0.15, vertexColors: true, blending: THREE.AdditiveBlending,
    depthWrite: false, transparent: true, opacity: 0.5,
  })));
  scene.add(starGroup);
}
createStarField();

const earthGroup = new THREE.Group();
scene.add(earthGroup);

function createAtmosphere() {
  const innerGeo = new THREE.SphereGeometry(1.08, 64, 64);
  const innerMat = new THREE.ShaderMaterial({
    uniforms: {},
    vertexShader: `varying vec3 vN; varying vec3 vP;
      void main(){vec4 w=modelMatrix*vec4(position,1.0);vN=normalize(mat3(modelMatrix)*normal);vP=w.xyz;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader: `varying vec3 vN; varying vec3 vP;
      void main(){float i=pow(0.72-dot(vN,normalize(cameraPosition-vP)),3.0);gl_FragColor=vec4(0.3,0.6,1.0,clamp(i,0.0,1.0)*0.6);}`,
    transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.FrontSide,
  });
  earthGroup.add(new THREE.Mesh(innerGeo, innerMat));
  const outerGeo = new THREE.SphereGeometry(1.25, 64, 64);
  const outerMat = new THREE.ShaderMaterial({
    uniforms: {},
    vertexShader: `varying vec3 vN; varying vec3 vP;
      void main(){vec4 w=modelMatrix*vec4(position,1.0);vN=normalize(mat3(modelMatrix)*normal);vP=w.xyz;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader: `varying vec3 vN; varying vec3 vP;
      void main(){float i=pow(0.68-dot(vN,normalize(cameraPosition-vP)),5.0);gl_FragColor=vec4(0.2,0.5,1.0,clamp(i,0.0,1.0)*0.25);}`,
    transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.FrontSide,
  });
  earthGroup.add(new THREE.Mesh(outerGeo, outerMat));
}
createAtmosphere();

const earthGeo = new THREE.SphereGeometry(1, 128, 128);

function createBumpMap() {
  const c = document.createElement('canvas'); c.width = 1024; c.height = 512;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#808080'; ctx.fillRect(0, 0, c.width, c.height);
  for (let i = 0; i < 20000; i++) {
    const x = Math.random() * c.width, y = Math.random() * c.height;
    const g = 100 + Math.random() * 60;
    ctx.fillStyle = `rgb(${g},${g},${g})`;
    ctx.fillRect(x, y, 3 + Math.random() * 3, 3 + Math.random() * 3);
  }
  return new THREE.CanvasTexture(c);
}
const bumpMap = createBumpMap();

(() => {
  const img = new Image();
  const CHUNK_SIZE = 800000;
  img.onload = () => {
    const cvs = document.createElement('canvas');
    cvs.width = img.width; cvs.height = img.height;
    const ctx = cvs.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const imageData = ctx.getImageData(0, 0, cvs.width, cvs.height);
    const d = imageData.data;
    const totalPixels = d.length / 4;
    let offset = 0;
    function processChunk() {
      const end = Math.min(offset + CHUNK_SIZE, totalPixels);
      const di = offset * 4;
      const de = end * 4;
      for (let i = di; i < de; i += 4) {
        const r = d[i], g = d[i + 1], b = d[i + 2];
        const lum = 0.299 * r + 0.587 * g + 0.114 * b;
        let f;
        if      (lum > 220) f = 0.55;
        else if (lum > 185) f = 0.65;
        else if (lum > 150) f = 0.78;
        else if (lum > 110) f = 0.90;
        else if (lum < 35)  f = 1.20;
        else if (lum < 70)  f = 1.08;
        else                f = 1.0;
        d[i] = Math.min(255, r * f);
        d[i + 1] = Math.min(255, g * f);
        d[i + 2] = Math.min(255, b * f);
      }
      offset = end;
      if (offset < totalPixels) {
        document.getElementById('loading').textContent = `亮度平衡中... ${Math.round(offset / totalPixels * 100)}%`;
        setTimeout(processChunk, 0);
      } else {
        ctx.putImageData(imageData, 0, 0);
        const texture = new THREE.CanvasTexture(cvs);
        texture.colorSpace = THREE.SRGBColorSpace;
        texture.anisotropy = 8;
        const earthMat = new THREE.MeshStandardMaterial({
          map: texture, bumpMap: bumpMap, bumpScale: 0.02,
          roughness: 0.85, metalness: 0.0,
        });
        const earth = new THREE.Mesh(earthGeo, earthMat);
        earth.name = 'earth';
        earthGroup.add(earth);
        document.getElementById('loading').style.opacity = '0';
        setTimeout(() => { const el = document.getElementById('loading'); if (el) el.remove(); }, 500);
      }
    }
    processChunk();
  };
  img.onerror = () => { document.getElementById('loading').textContent = '贴图加载失败'; };
  img.src = 'earth_hd.jpg';
})();

function createBorderOverlay() {
  const countryCanvas = document.createElement('canvas');
  countryCanvas.width = 8192; countryCanvas.height = 4096;
  const cctx = countryCanvas.getContext('2d');
  const provinceCanvas = document.createElement('canvas');
  provinceCanvas.width = 8192; provinceCanvas.height = 4096;
  const pctx = provinceCanvas.getContext('2d');

  const countriesUrl = 'https://cdn.jsdelivr.net/gh/nvkelso/natural-earth-vector@master/geojson/ne_50m_admin_0_countries.geojson';
  const provincesUrl = 'https://cdn.jsdelivr.net/gh/nvkelso/natural-earth-vector@master/geojson/ne_50m_admin_1_states_provinces.geojson';

  Promise.all([
    fetch(countriesUrl).then(r => r.json()),
    fetch(provincesUrl).then(r => r.json()),
  ])
  .then(([countries, provinces]) => {
    function toCanvas(lon, lat, w, h) { return [(lon + 180) / 360 * w, (90 - lat) / 180 * h]; }
    function drawGeoJSON(geojson, ctx, w, h) {
      geojson.features.forEach(feature => {
        const geom = feature.geometry;
        if (!geom) return;
        function drawRing(ring) {
          if (ring.length < 2) return;
          ctx.beginPath();
          const [sx, sy] = toCanvas(ring[0][0], ring[0][1], w, h);
          ctx.moveTo(sx, sy);
          for (let i = 1; i < ring.length; i++) {
            const [px, py] = toCanvas(ring[i][0], ring[i][1], w, h);
            ctx.lineTo(px, py);
          }
          ctx.stroke();
        }
        if (geom.type === 'Polygon') geom.coordinates.forEach(drawRing);
        else if (geom.type === 'MultiPolygon') geom.coordinates.forEach(poly => poly.forEach(drawRing));
      });
    }

    pctx.strokeStyle = 'rgba(0,0,0,1.0)';
    pctx.lineWidth = 0.9;
    pctx.lineJoin = 'round';
    drawGeoJSON(provinces, pctx, provinceCanvas.width, provinceCanvas.height);

    const colorCanvas = document.createElement('canvas');
    colorCanvas.width = 8192; colorCanvas.height = 4096;
    const colorCtx = colorCanvas.getContext('2d');

    function genPalette(n) {
      const cols = [];
      for (let i = 0; i < n; i++) { const h = (i * 137.508) % 360; cols.push(`hsla(${h},50%,58%,0.25)`); }
      return cols;
    }
    const PALETTE = genPalette(24);
    const countryFeatures = countries.features.filter(f => { const n = f.properties.NAME || ''; return n && n !== 'Antarctica'; });

    const adj = {};
    function getBBox(geometry) {
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      function scan(coords) {
        for (const c of coords) {
          if (Array.isArray(c[0])) scan(c);
          else { minX = Math.min(minX, c[0]); maxX = Math.max(maxX, c[0]); minY = Math.min(minY, c[1]); maxY = Math.max(maxY, c[1]); }
        }
      }
      scan(geometry.coordinates);
      return { minX, maxX, minY, maxY };
    }

    const bboxes = countryFeatures.map(f => ({ name: f.properties.NAME, bbox: getBBox(f.geometry) }));
    for (let i = 0; i < bboxes.length; i++) {
      for (let j = i + 1; j < bboxes.length; j++) {
        const a = bboxes[i], b = bboxes[j];
        if (a.bbox.maxX < b.bbox.minX - 1 || b.bbox.maxX < a.bbox.minX - 1) continue;
        if (a.bbox.maxY < b.bbox.minY - 1 || b.bbox.maxY < a.bbox.minY - 1) continue;
        if (!adj[a.name]) adj[a.name] = new Set();
        if (!adj[b.name]) adj[b.name] = new Set();
        adj[a.name].add(b.name);
        adj[b.name].add(a.name);
      }

    function latLonToVec3(lat, lon, r) {
      const phi = (90 - lat) * Math.PI / 180;
      const theta = (lon + 180) * Math.PI / 180;
      return new THREE.Vector3(
        -r * Math.sin(phi) * Math.cos(theta),
        r * Math.cos(phi),
        r * Math.sin(phi) * Math.sin(theta)
      );
    }

    function ringCentroid(ring) {
      let cx = 0, cy = 0, area = 0, n = ring.length;
      for (let i = 0; i < n - 1; i++) {
        const x0 = ring[i][0], y0 = ring[i][1];
        const x1 = ring[i + 1][0], y1 = ring[i + 1][1];
        const a = x0 * y1 - x1 * y0;
        area += a;
        cx += (x0 + x1) * a;
        cy += (y0 + y1) * a;
      }
      area /= 2;
      if (Math.abs(area) < 1) return null;
      return [cx / (6 * area), cy / (6 * area), Math.abs(area)];
    }

    function pointInRing(lon, lat, ring) {
      let inside = false;
      for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
        const xi = ring[i][0], yi = ring[i][1];
        const xj = ring[j][0], yj = ring[j][1];
        if ((yi > lat) !== (yj > lat) && lon < (xj - xi) * (lat - yi) / (yj - yi) + xi)
          inside = !inside;
      }
      return inside;
    }

    function ensureInside(clon, clat, ring) {
      if (pointInRing(clon, clat, ring)) return [clon, clat];
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      for (const [x, y] of ring) { minX = Math.min(minX, x); maxX = Math.max(maxX, x); minY = Math.min(minY, y); maxY = Math.max(maxY, y); }
      let best = null, bestDist = Infinity;
      const steps = 12;
      for (let i = 0; i <= steps; i++) {
        for (let j = 0; j <= steps; j++) {
          const x = minX + (maxX - minX) * i / steps;
          const y = minY + (maxY - minY) * j / steps;
          if (pointInRing(x, y, ring)) {
            const d = (x - clon) * (x - clon) + (y - clat) * (y - clat);
            if (d < bestDist) { bestDist = d; best = [x, y]; }
          }
        }
      }
      return best || [clon, clat];
    }

function toCanvasCoord(lon, lat, w, h) { return [(lon + 180) / 360 * w, (90 - lat) / 180 * h]; }

function vec3ToLatLon(pos) {
  earthGroup.updateMatrixWorld(true);
  const local = pos.clone().applyMatrix4(new THREE.Matrix4().copy(earthGroup.matrixWorld).invert());
  const n = local.normalize();
  const lat = Math.asin(n.y) * 180 / Math.PI;
  const lon = Math.atan2(-n.z, n.x) * 180 / Math.PI;
  return { lat, lon };
}

function pointInFeature(lon, lat, feature) {
  const geom = feature.geometry;
  if (!geom) return false;
  function checkRing(ring) {
    let inside = false;
    for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
      const xi = ring[i][0], yi = ring[i][1];
      const xj = ring[j][0], yj = ring[j][1];
      if ((yi > lat) !== (yj > lat) && lon < (xj - xi) * (lat - yi) / (yj - yi) + xi) inside = !inside;
    }
    return inside;
  }
  if (geom.type === 'Polygon') return geom.coordinates.some(checkRing);
  if (geom.type === 'MultiPolygon') return geom.coordinates.some(poly => poly.some(checkRing));
  return false;
}

function isPointInTaiwan(lon, lat) {
  const twProvince = window.__taiwanProvinceFeature;
  const twCountry = window.__taiwanCountryFeature;
  if (twProvince && pointInFeature(lon, lat, twProvince)) return true;
  if (twCountry && pointInFeature(lon, lat, twCountry)) return true;
  const tolerance = 0.15;
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      if (dx === 0 && dy === 0) continue;
      if (twProvince && pointInFeature(lon + dx * tolerance, lat + dy * tolerance, twProvince)) return true;
      if (twCountry && pointInFeature(lon + dx * tolerance, lat + dy * tolerance, twCountry)) return true;
    }
  }
  return false;
}

function getProvinceAt(lon, lat) {
  if (isPointInTaiwan(lon, lat)) return window.__taiwanProvinceFeature;
  const geo = window.__provincesGeoJSON;
  if (!geo) return null;
  for (const feature of geo.features) {
    if (!feature.properties.name) continue;
    if (pointInFeature(lon, lat, feature)) return feature;
  }
  return null;
}

function getCountryAt(lon, lat) {
  const geo = window.__countriesGeoJSON;
  if (!geo) return null;
  let chinaFeature = null;
  for (const f of geo.features) { if (f.properties.NAME === 'China') { chinaFeature = f; break; } }
  for (const feature of geo.features) {
    const name = feature.properties.NAME || '';
    if (!name || name === 'Antarctica') continue;
    if (pointInFeature(lon, lat, feature)) {
      if (name === 'Taiwan') return chinaFeature;
      return feature;
    }
  }
  if (chinaFeature && isPointInTaiwan(lon, lat)) return chinaFeature;
  if (chinaFeature && lon >= 118 && lon <= 122 && lat >= 21.5 && lat <= 25.5) return chinaFeature;
  return null;
}

function drawHighlight(feature, level) {
  const w = highlightCanvas.width, hh = highlightCanvas.height;
  hctx.clearRect(0, 0, w, hh);
  if (!feature) { highlightTex.needsUpdate = true; return; }
  const geom = feature.geometry;
  function drawPolygonRing(ring) {
    if (ring.length < 2) return;
    hctx.beginPath();
    const [sx, sy] = toCanvasCoord(ring[0][0], ring[0][1], w, hh);
    hctx.moveTo(sx, sy);
    for (let i = 1; i < ring.length; i++) {
      const [px, py] = toCanvasCoord(ring[i][0], ring[i][1], w, hh);
      hctx.lineTo(px, py);
    }
    hctx.closePath();
    hctx.fillStyle = 'rgba(255,255,255,0.1)';
    hctx.fill();
    hctx.strokeStyle = 'rgba(255,255,255,0.4)';
    hctx.lineWidth = 1.8;
    hctx.lineJoin = 'round';
    hctx.stroke();
  }
  if (geom.type === 'Polygon') geom.coordinates.forEach(drawPolygonRing);
  else if (geom.type === 'MultiPolygon') geom.coordinates.forEach(poly => poly.forEach(drawPolygonRing));
  if (level === 'country' && feature.properties.NAME === 'China') {
    const tw = window.__taiwanProvinceFeature;
    if (tw) {
      const twGeom = tw.geometry;
      if (twGeom.type === 'Polygon') twGeom.coordinates.forEach(drawPolygonRing);
      else if (twGeom.type === 'MultiPolygon') twGeom.coordinates.forEach(poly => poly.forEach(drawPolygonRing));
    }
  }
  highlightTex.needsUpdate = true;
}

function confirmSelection() {
  if (!selectedCountry) return;
  gameState = 'playing';
  confirmedCountry = { ...selectedCountry };
  document.getElementById('back-btn').classList.remove('visible');

  earthAnim.from = earthGroup.position.x;
  earthAnim.to = 0;
  earthAnim.t = 0;
  earthAnim.lastTick = performance.now();
  earthAnim.active = true;

  const feature = confirmedCountry.feature;
  if (feature && feature.geometry) {
    let cx = 0, cy = 0, cnt = 0;
    function scanCoords(coords) {
      for (const c of coords) {
        if (Array.isArray(c[0])) scanCoords(c);
        else { cx += c[0]; cy += c[1]; cnt++; }
      }
    }
    scanCoords(feature.geometry.coordinates);
    if (cnt > 0) {
      const avgLon = cx / cnt;
      const avgLat = cy / cnt;
      const targetRotY = -(avgLon + 90) * Math.PI / 180;
      let diffY = targetRotY - (earthGroup.rotation.y % (Math.PI * 2));
      if (diffY > Math.PI) diffY -= Math.PI * 2;
      if (diffY < -Math.PI) diffY += Math.PI * 2;
      rotAnim.from = earthGroup.rotation.y;
      rotAnim.to = earthGroup.rotation.y + diffY;
      rotAnim.t = 0;
      rotAnim.lastTick = performance.now();
      rotAnim.active = true;
      const targetRotX = avgLat * Math.PI / 180;
      rotAnimX.from = earthGroup.rotation.x;
      rotAnimX.to = targetRotX;
      rotAnimX.t = 0;
      rotAnimX.lastTick = performance.now();
      rotAnimX.active = true;
    }
  }

  document.getElementById('select-phase-hint').classList.remove('visible');
  confirmBtnEl.classList.remove('visible');
  previewFlagEl.classList.remove('visible');
  previewFlagEl.classList.add('sink');
  previewGradientEl.classList.remove('visible');
  previewGradientEl.classList.add('sink');

  aohShowUI();
  aohInitCountryData(confirmedCountry.enName);
}

const TIME_SLOTS = ['00:00','03:00','06:00','09:00','12:00','15:00','18:00','21:00'];
const SPEED_LEVELS = [0, 1, 2, 4, 8, 16];
const SPEED_LABELS = ['x0','x1','x2','x4','x8','x16'];
let timeYear = 2026, timeMonth = 1, timeDay = 1;
let timeSlotIndex = 0;
let speedIndex = 1;
let timeRunning = false;
let timeAccum = 0;

function updateTimeDisplay() {
  document.getElementById('time-text').textContent = `${timeYear}年${timeMonth}月${timeDay}日 ${TIME_SLOTS[timeSlotIndex]}`;
}

function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }

const _origAdvanceTime = function() {
  timeSlotIndex++;
  if (timeSlotIndex >= TIME_SLOTS.length) {
    timeSlotIndex = 0;
    timeDay++;
    if (timeDay > daysInMonth(timeYear, timeMonth)) {
      timeDay = 1;
      timeMonth++;
      if (timeMonth > 12) { timeMonth = 1; timeYear++; }
    }
  }
  updateTimeDisplay();
};

const _origSetTimeSpeed = function(idx) {
  speedIndex = Math.max(0, Math.min(SPEED_LEVELS.length - 1, idx));
  timeRunning = speedIndex > 0;
  const el = document.getElementById('time-speed');
  const pb = document.getElementById('btn-pause');
  if (el) el.textContent = SPEED_LABELS[speedIndex];
  if (pb) { pb.textContent = timeRunning ? '||' : '>'; pb.classList.toggle('active', !timeRunning); }
};

const advanceTime = function() { _origAdvanceTime(); aohTickEconomy(); aohTickPopulation(); aohTickProvinceBuildings(); aohTickTech(); };
const setTimeSpeed = function(i) { _origSetTimeSpeed(i); aohSyncTime(); };

function aohSyncTime() {
  const el = document.getElementById('time-date');
  const ec = document.getElementById('time-clock');
  if (el) el.textContent = timeYear + '年' + timeMonth + '月' + timeDay + '日';
  if (ec) ec.textContent = TIME_SLOTS[timeSlotIndex];
}

document.getElementById('btn-faster').addEventListener('click', () => setTimeSpeed(speedIndex + 1));
document.getElementById('btn-slower').addEventListener('click', () => setTimeSpeed(speedIndex - 1));
document.getElementById('btn-pause').addEventListener('click', () => {
  if (timeRunning) setTimeSpeed(0); else setTimeSpeed(1);
});

let lastTimeTick = performance.now();
function tickTime(now) {
  if (timeRunning && SPEED_LEVELS[speedIndex] > 0) {
    timeAccum += now - lastTimeTick;
    const interval = 1000 / SPEED_LEVELS[speedIndex];
    while (timeAccum >= interval) {
      timeAccum -= interval;
      advanceTime();
    }
  }
  lastTimeTick = now;
}
updateTimeDisplay();

function animate() {
  requestAnimationFrame(animate);
  tickTime(performance.now());

  if (gameState === 'menu') {
    earthGroup.rotation.y += 0.001;
  } else if (gameState === 'selecting' && !earthStopped) {
    earthGroup.rotation.y += 0.0004;
  }

  if (gameState === 'selecting') {
    const targetRotX = -(mouseNormY) * 0.5;
    earthGroup.rotation.x += (targetRotX - earthGroup.rotation.x) * 0.12;
  }

  if ((gameState === 'selecting' || gameState === 'playing') && !globeDragging) {
    if (Math.abs(globeVelocityX) > 0.0001) {
      earthGroup.rotation.y += globeVelocityX;
      globeVelocityX *= 0.95;
    }
    if (Math.abs(globeVelocityY) > 0.0001) {
      earthGroup.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, earthGroup.rotation.x + globeVelocityY));
      globeVelocityY *= 0.95;
    }
  }

  const sg = scene.getObjectByName('starGroup');
  if (sg) {
    if (globeDragging) {
      sg.rotation.y = earthGroup.rotation.y;
      sg.rotation.x = earthGroup.rotation.x;
    }
  }

  if (earthAnim.active) {
    const now = performance.now();
    const dt = now - (earthAnim.lastTick || now);
    earthAnim.lastTick = now;
    earthAnim.t += dt;
    let p = Math.min(1, earthAnim.t / earthAnim.dur);
    p = 1 - Math.pow(1 - p, 4);
    earthGroup.position.x = earthAnim.from + (earthAnim.to - earthAnim.from) * p;
    if (earthAnim.t >= earthAnim.dur) { earthAnim.active = false; earthGroup.position.x = earthAnim.to; }
  }
  if (earthAnimX.active) {
    const now = performance.now();
    const dt = now - (earthAnimX.lastTick || now);
    earthAnimX.lastTick = now;
    earthAnimX.t += dt;
    let p = Math.min(1, earthAnimX.t / earthAnimX.dur);
    p = 1 - Math.pow(1 - p, 4);
    earthGroup.position.y = earthAnimX.from + (earthAnimX.to - earthAnimX.from) * p;
    if (earthAnimX.t >= earthAnimX.dur) { earthAnimX.active = false; earthGroup.position.y = earthAnimX.to; }
  }
  if (rotAnim.active) {
    const now = performance.now();
    const dt = now - (rotAnim.lastTick || now);
    rotAnim.lastTick = now;
    rotAnim.t += dt;
    let p = Math.min(1, rotAnim.t / rotAnim.dur);
    p = 1 - Math.pow(1 - p, 4);
    earthGroup.rotation.y = rotAnim.from + (rotAnim.to - rotAnim.from) * p;
    if (rotAnim.t >= rotAnim.dur) { rotAnim.active = false; earthGroup.rotation.y = rotAnim.to; }
  }
  if (rotAnimX.active) {
    const now = performance.now();
    const dt = now - (rotAnimX.lastTick || now);
    rotAnimX.lastTick = now;
    rotAnimX.t += dt;
    let p = Math.min(1, rotAnimX.t / rotAnimX.dur);
    p = 1 - Math.pow(1 - p, 4);
    earthGroup.rotation.x = rotAnimX.from + (rotAnimX.to - rotAnimX.from) * p;
    if (rotAnimX.t >= rotAnimX.dur) { rotAnimX.active = false; earthGroup.rotation.x = rotAnimX.to; }
  }
  if (camAnim.active) {
    const now = performance.now();
    const dt = now - (camAnim.lastTick || now);
    camAnim.lastTick = now;
    camAnim.t += dt;
    let p = Math.min(1, camAnim.t / camAnim.dur);
    p = 1 - Math.pow(1 - p, 4);
    camera.position.lerpVectors(camAnim.from, camAnim.to, p);
    if (camAnim.t >= camAnim.dur) {
      camAnim.active = false;
      camera.position.copy(camAnim.to);
      cameraTarget.set(0, 0, 0);
      controls.target.set(0, 0, 0);
      controls.object.position.copy(camAnim.to);
      controls.update();
    }
  }

  const dist = camera.position.length();
  const zdEl = document.getElementById('zoom-distance');
  zdEl.textContent = '距离: ' + dist.toFixed(2);
  zdEl.style.opacity = gameState === 'menu' ? '0' : '1';
  zdEl.style.display = gameState === 'menu' ? 'none' : 'block';
  controls.rotateSpeed = 0.08 + 0.92 * Math.min(1, (dist - 1.2) / 6.8);
  if (window.__provinceBorderMat) {
    window.__provinceBorderMat.opacity = 0.85 * (1.0 - Math.min(1, Math.max(0, (dist - 1.2) / 0.8)));
  }
  if (window.__colorSphereMat) {
    window.__colorSphereMat.opacity = Math.min(1, Math.max(0, (dist - 0.5) / 2.3));
  }
  if (window.__highlightMat && highlightSphere.visible) {
    window.__highlightMat.opacity = 0.5 + 0.2 * Math.sin(performance.now() * 0.003);
  }
  if (window.__allLabels && window.__allLabels.length > 0) {
    const maxLogArea = Math.log((window.__maxLabelArea || 150000) + 1);
    if (dist > 1.5) {
      for (const lbl of window.__allLabels) {
        const areaScore = Math.log(lbl.area + 1) / maxLogArea;
        lbl.mesh.visible = areaScore > 0.25;
        lbl.mesh.material.opacity = 1;
      }
    } else {
      for (const lbl of window.__allLabels) {
        lbl.mesh.visible = true;
        lbl.mesh.material.opacity = Math.min(1, Math.max(0, (dist - 1.32) / 0.08));
      }
    }
  }
  if (window.__capitalStars) {
    window.__capitalStars.visible = true;
    window.__capitalStars.children.forEach(s => { if (s.material) s.material.opacity = 1; });
  }
  controls.update();
  composer.render();
}

document.addEventListener('pointerdown', (e) => {
  if (e.target !== renderer.domElement) return;
  mouseDown.set(e.clientX, e.clientY);
});

document.addEventListener('pointerup', (e) => {
  if (e.target !== renderer.domElement) return;
  if (gameState === 'menu') return;
  const dx = e.clientX - mouseDown.x;
  const dy = e.clientY - mouseDown.y;
  if (dx * dx + dy * dy > 25) return;
  if (!window.__countriesGeoJSON) return;

  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const earthMesh = earthGroup.getObjectByName('earth');
  if (!earthMesh) return;
  earthGroup.updateMatrixWorld(true);
  const hits = raycaster.intersectObject(earthMesh, false);
  if (hits.length === 0) { selectRegion(null); return; }

  const { lat, lon } = vec3ToLatLon(hits[0].point);
  const dist = camera.position.length();

  if (dist <= 1.5) {
    const province = getProvinceAt(lon, lat);
    if (province) { selectRegion(province, 'province'); return; }
    const fallback = getCountryAt(lon, lat);
    if (fallback) { selectRegion(fallback, 'country'); return; }
    selectRegion(null);
    return;
  }
  const feature = getCountryAt(lon, lat);
  if (feature) {
    const countryName = feature.properties.NAME || '';
    const provinces = window.__provincesGeoJSON;
    const hasProvinces = provinces && provinces.features.some(f => f.properties.admin === countryName);
    selectRegion(feature, hasProvinces ? 'country' : 'province');
  } else {
    selectRegion(null);
  }
});

function nameHash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) - h) + str.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}

function initProvinceBuildings() {
  if (!window.__provincesGeoJSON) return;
  window.__provincesGeoJSON.features.forEach(feature => {
    const name = feature.properties.name || '';
    if (!name) return;
    if (provinceData[name]) return;
    const h = nameHash(name);
    const admin = feature.properties.admin || '';
    const isCoastal = coastalCountries.has(admin);
    provinceData[name] = {
      economy: 20 + (h % 60),
      population: 50000 + (h % 500000),
      buildingLevel: 1 + (h % 3),
      roadLv: 1 + (h % 2),
      portLv: isCoastal ? 1 + (h % 2) : 0,
      infraLv: 1 + (h % 2),
      farmLv: 1 + (h % 2),
      barrackLv: 0 + (h % 2),
      isCoastal,
    };
  });
}

function aohGetProvinceEcon(name) {
  if (!provinceData[name]) {
    const h = nameHash(name || 'unknown');
    return {
      economy: 20 + (h % 60), population: 50000 + (h % 500000),
      buildingLevel: 1, roadLv: 1, portLv: 0, infraLv: 1, farmLv: 1, barrackLv: 0, isCoastal: false,
    };
  }
  return provinceData[name];
}

function aohTickProvinceBuildings() {
  for (const name in provinceData) {
    const p = provinceData[name];
    p.economy = Math.max(0, Math.min(100, p.economy + 0.1 * (p.buildingLevel - 1)));
    p.population += Math.round(p.population * 0.0001 * (p.infraLv + p.farmLv));
    p.buildingLevel = Math.min(10, p.roadLv + p.infraLv + p.farmLv + p.barrackLv + (p.portLv || 0));
  }
}

function renderProvinceBuildings(name) {
  const p = provinceData[name];
  if (!p) return '';
  let html = '';
  for (const [key, def] of Object.entries(buildingDefs)) {
    if (key === 'port' && !p.isCoastal) continue;
    const lv = p[key + 'Lv'] || 0;
    const nextCost = lv < def.maxLevel ? def.baseCost * (lv + 1) : null;
    html += `<div class="rp-stat"><span class="rp-label">${def.name}</span><span class="rp-value">Lv.${lv}${nextCost ? ' (升级: ' + nextCost + '💰)' : ' (MAX)'}</span></div>`;
  }
  return html;
}

const aohTechBonuses = {};
const techProgress = {};

function aohTickTech() {
  for (const tech of techDefs) {
    if (techProgress[tech.id] === 'researching') {
      if (!aohTechBonuses[tech.id]) aohTechBonuses[tech.id] = { ticks: 0 };
      aohTechBonuses[tech.id].ticks++;
      if (aohTechBonuses[tech.id].ticks >= tech.days) {
        techProgress[tech.id] = 'done';
        tech.apply();
        aohNotify(`科技完成: ${tech.name}`);
        aohUpdateResources();
        delete aohTechBonuses[tech.id];
        const techBtn = document.getElementById('sb-tech');
        if (techBtn) techBtn.classList.remove('researching');
      }
    }
  }
}

function aohRenderTech() {
  const grid = document.getElementById('tech-grid');
  grid.innerHTML = '';
  for (const tech of techDefs) {
    const status = techProgress[tech.id] || 'available';
    const progress = status === 'researching' ? (aohTechBonuses[tech.id]?.ticks || 0) / tech.days * 100 : status === 'done' ? 100 : 0;
    const card = document.createElement('div');
    card.className = 'tech-card' + (status === 'done' ? ' researched' : status === 'researching' ? ' researching' : '');
    card.innerHTML = `
      <div class="tech-name">${tech.name}</div>
      <div class="tech-desc">${tech.desc}</div>
      <div class="tech-cost">${status === 'done' ? '✅ 已完成' : status === 'researching' ? '⏳ 研究中...' : `花费: ${tech.cost}💰 | 耗时: ${tech.days}天`}</div>
      ${status === 'researching' ? `<div class="tech-progress"><div class="tech-progress-bar" style="width:${progress}%"></div></div>` : ''}
    `;
    if (status === 'available') {
      card.addEventListener('click', () => {
        if (aohRes.gold >= tech.cost) {
          aohRes.gold -= tech.cost;
          aohUpdateResources();
          techProgress[tech.id] = 'researching';
          aohTechBonuses[tech.id] = { ticks: 0 };
          aohNotify(`开始研究: ${tech.name}`);
          document.getElementById('sb-tech').classList.add('researching');
          aohRenderTech();
        } else {
          aohNotify('金币不足!');
        }
      });
    }
    grid.appendChild(card);
  }
}

let officerPool = [];

function generateOfficer() {
  const name = officerNames[Math.floor(Math.random() * officerNames.length)];
  const spec = officerSpecialties[Math.floor(Math.random() * officerSpecialties.length)];
  const stats = {};
  for (const s of officerSpecialties) {
    stats[s] = 1 + Math.floor(Math.random() * 9);
  }
  stats[spec] = Math.min(10, stats[spec] + 3 + Math.floor(Math.random() * 3));
  return { name, spec, stats, id: Math.random().toString(36).slice(2, 8) };
}

function refreshOfficerPool() {
  officerPool = [];
  const count = Math.max(3, Math.round(aohRes.economy / 15));
  for (let i = 0; i < count; i++) officerPool.push(generateOfficer());
  aohRenderArmyCounts();
}

function aohRenderOfficers() {
  const grid = document.getElementById('officer-grid');
  grid.innerHTML = '';
  for (const off of officerPool) {
    const card = document.createElement('div');
    card.className = 'officer-card';
    let statsHtml = '';
    for (const s of officerSpecialties) {
      statsHtml += `<div class="off-skill"><span class="sk-name">${specNames[s]}</span><span class="sk-val">${off.stats[s]}</span></div>`;
    }
    card.innerHTML = `
      <div class="off-name">${off.name}</div>
      <div class="off-spec">${specNames[off.spec]}型</div>

}
